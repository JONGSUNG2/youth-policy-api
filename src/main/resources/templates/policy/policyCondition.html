<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI 정책 추천 - 조건 입력</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f6fb;
            color: #333;
        }

        /* Container */
        .container {
            max-width: 480px;
            margin: 60px auto;
            background: #ffffff;
            padding: 40px 32px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        h2 {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2d68ff;
        }

        label {
            font-weight: 600;
            margin-top: 18px;
            display: block;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #d6d9e0;
            border-radius: 10px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 30px;
            background: #2d68ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #2557d6;
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #2d68ff;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AI 정책 추천 받기</h2>

    <form th:action="@{/policy/condition}" method="post" th:object="${policyConditionVO}">

        <label>나이</label>
        <input type="number" name="age" min="1" th:field="*{age}" required>

        <label>거주 지역</label>
        <select th:field="*{region}">
            <option value="">전체 지역</option>
            <option th:each="r : ${regions}" th:value="${r.code}" th:text="${r.name}"></option>
        </select>

        <label>전체 분야</label>
        <select th:field="*{mainCategory}">
            <option value="">선택하세요</option>
            <option th:each="c : ${mainCategories}" th:value="${c.name}" th:text="${c.name}"></option>
        </select>

        <button type="submit">AI 추천 받기</button>
    </form>

    <div class="back-link">
        <a href="/">← 메인으로 돌아가기</a>
    </div>

</div>

</body>
</html>
