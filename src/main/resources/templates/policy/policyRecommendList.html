<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>추천 정책 목록</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .policy-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        .policy-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.2s ease;
        }
        .policy-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .policy-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .policy-desc {
            font-size: 14px;
            color: #444;
            margin-bottom: 10px;
        }
        .policy-meta {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<h2>AI 추천 정책 목록</h2>

<div class="policy-container">

    <!-- 정책 카드 예시 -->
    <div class="policy-card" th:each="recommendPolicy:${recommendList}">
        <div th:text="'로그인 ID: '+${recommendPolicy.loginId}"></div>
        <div class="policy-title" th:text="${recommendPolicy.policyName}">정책 제목</div>
        <div class="policy-desc" th:text="${recommendPolicy.reason}">AI 추천 이유 또는 정책 설명</div>
        <div class="policy-meta">
            <p th:text="'대분류: '+${recommendPolicy.mainCategory}"></p>
            <p th:text="'지역: '+${recommendPolicy.region}"></p>
            <p th:text="'나이: '+${recommendPolicy.age}"></p>
        </div>
        <div th:text="'기대효과: '+${recommendPolicy.effect}"></div>
    </div>


</div>

</body>
</html>
